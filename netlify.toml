[build]
  command   = "npm run build"
  publish   = "dist"

# SPA fallback — all routes served by index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://semeuse.netlify.app https://cdn.jsdelivr.net; frame-src https://www.google.com/maps/; connect-src 'self'"

# Long-term cache for hashed assets (JS/CSS bundles from Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-term cache for WebP images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/galerie/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/salles/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# No cache for index.html so deploys are always fresh
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
