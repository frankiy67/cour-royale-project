<!DOCTYPE html>
<html>
  <body>
    <!-- Static form for Netlify build-time detection — contact-salles -->
    <form name="contact-salles" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="nom" />
      <input name="email" />
      <input name="telephone" />
      <input name="sujet" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
